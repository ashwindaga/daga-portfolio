name: Monthly Portfolio Update

on:
  schedule:
    - cron: '0 4 8 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyxirr

      - name: Run SIP updater
        run: python update_sips.py

      - name: Verify HTML content
        run: |
          echo "RECENT_TXNS line:"
          grep "const RECENT_TXNS" daga_family_portfolio.html | cut -c1-150
          echo "ACTIVE_SIPS line:"
          grep "const ACTIVE_SIPS" daga_family_portfolio.html | cut -c1-150

      - name: Commit and push all changes
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add -f \
            daksh_transaction_ledger.json \
            kush_transaction_ledger.json \
            ashwin_transaction_ledger.json \
            daksh_metrics_summary.json \
            kush_metrics_summary.json \
            ashwin_metrics_summary.json \
            daga_family_portfolio.html
          git status
          git diff --cached --stat
          git commit -m "Portfolio update $(date +'%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git push origin main || (git pull --rebase origin main && git push origin main)
