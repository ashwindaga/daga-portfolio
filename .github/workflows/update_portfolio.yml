name: Monthly Portfolio Update

on:
  schedule:
    - cron: '0 4 8 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyxirr

      - name: Run SIP updater
        run: python update_sips.py

      - name: Verify HTML was updated
        run: |
          echo "=== RECENT_TXNS line in HTML ==="
          grep "const RECENT_TXNS" daga_family_portfolio.html | head -c 200
          echo ""
          echo "=== ACTIVE_SIPS line in HTML ==="
          grep "const ACTIVE_SIPS" daga_family_portfolio.html | head -c 200
          echo ""

      - name: Push updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Portfolio update ${{ github.run_id }}"
          file_pattern: |
            daksh_transaction_ledger.json
            kush_transaction_ledger.json
            ashwin_transaction_ledger.json
            daksh_metrics_summary.json
            kush_metrics_summary.json
            ashwin_metrics_summary.json
            daga_family_portfolio.html
